<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        --accent: #ef4444;
        --ink: #101828;
        --muted: #667085;
        --line: #e4e7ec;
        --panel: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
      }

      .dropzone {
        align-items: center;
        background:
          linear-gradient(135deg, rgba(239, 68, 68, 0.08), rgba(14, 165, 233, 0.06)),
          var(--panel);
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        cursor: pointer;
        display: grid;
        gap: 10px;
        min-height: 176px;
        padding: 22px;
        place-items: center;
        text-align: center;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
        width: 100%;
      }

      .dropzone.active,
      .dropzone:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 18px 38px rgba(16, 24, 40, 0.08);
        outline: none;
        transform: translateY(-1px);
      }

      .icon {
        align-items: center;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 8px 22px rgba(16, 24, 40, 0.08);
        display: flex;
        height: 48px;
        justify-content: center;
        width: 48px;
      }

      .title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.35;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        max-width: 430px;
      }

      .preview {
        border-radius: 12px;
        display: none;
        max-height: 130px;
        max-width: 100%;
        object-fit: contain;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
      }

      input {
        display: none;
      }
    </style>
  </head>
  <body>
    <label class="dropzone" tabindex="0" id="dropzone">
      <input id="picker" type="file" accept="image/png,image/jpeg,image/webp" multiple />
      <div class="icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round" />
        </svg>
      </div>
      <img id="preview" class="preview" alt="参考图预览" />
      <div>
        <div class="title">粘贴、拖入或点击添加参考图片</div>
        <div class="hint">复制图片后按 Ctrl+V，也可以从文件夹拖拽图片到这里。</div>
      </div>
      <div class="status" id="status">等待参考图片</div>
    </label>

    <script>
      const Streamlit = {
        setComponentReady() {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
            "*",
          );
        },
        setComponentValue(value) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" },
            "*",
          );
        },
        setFrameHeight(height) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height },
            "*",
          );
        },
      };
      const dropzone = document.getElementById("dropzone");
      const picker = document.getElementById("picker");
      const status = document.getElementById("status");
      let references = [];

      function setFrameHeight() {
        const height = Math.max(
          190,
          dropzone.offsetHeight || 0,
          Math.ceil(dropzone.getBoundingClientRect().height || 0),
        );
        Streamlit.setFrameHeight(height + 4);
      }

      function setStatus(message) {
        status.textContent = message;
        setFrameHeight();
      }

      function readFile(file) {
        return new Promise((resolve, reject) => {
          if (!file || !file.type.startsWith("image/")) {
            reject(new Error("请使用 PNG、JPG 或 WebP 图片"));
            return;
          }

          const reader = new FileReader();
          reader.onload = () =>
            resolve({
              name: file.name || "clipboard-image.png",
              type: file.type,
              dataUrl: reader.result,
            });
          reader.onerror = () => reject(new Error("读取图片失败"));
          reader.readAsDataURL(file);
        });
      }

      async function publishFiles(files, replace = false) {
        const images = Array.from(files || []);
        if (!images.length) {
          setStatus("没有找到图片");
          return;
        }

        try {
          const loaded = await Promise.all(images.map(readFile));
          references = replace ? loaded : references.concat(loaded);
          setStatus(`${references.length} 张参考图片已载入`);
          Streamlit.setComponentValue({ images: references });
        } catch (error) {
          setStatus(error.message || "读取图片失败");
        }
      }

      dropzone.addEventListener("click", () => picker.click());
      dropzone.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          picker.click();
        }
      });
      picker.addEventListener("change", () => publishFiles(picker.files, true));

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("active");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, () => dropzone.classList.remove("active"));
      });

      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        publishFiles(event.dataTransfer.files, true);
      });

      window.addEventListener("paste", (event) => {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));
        if (!imageItem) {
          setStatus("剪贴板里没有图片");
          return;
        }
        publishFiles([imageItem.getAsFile()], false);
      });

      Streamlit.setComponentReady();
      setFrameHeight();
      window.addEventListener("load", setFrameHeight);
      window.addEventListener("resize", setFrameHeight);
      if ("ResizeObserver" in window) {
        new ResizeObserver(setFrameHeight).observe(dropzone);
      }
      setTimeout(setFrameHeight, 100);
      setTimeout(setFrameHeight, 500);
    </script>
  </body>
</html>
